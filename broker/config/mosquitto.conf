# ================================================================
# Mosquitto MQTT Broker 설정
#
# Phase 1: 평문 MQTT 1883 포트 (개발용)
# Phase 4: TLS + X.509 mTLS 인증 활성화
# Phase 10: Spring Boot 백엔드도 mTLS로 붙을 수 있게 지원 (MqttConfig.java, mqtt.tls.enabled)
#
# 인증서 생성: broker/certs/generate-certs.sh 실행
# 활성화 순서: 1) 위 스크립트 실행 2) 아래 TLS 섹션 주석 해제 3) docker-compose restart mosquitto
#            4) 백엔드 .env에서 MQTT_TLS_ENABLED=true, MQTT_PORT=8883로 변경 후 재시작
#            5) 시뮬레이터는 TLS_CA_CERT/TLS_CLIENT_CERT/TLS_CLIENT_KEY 설정 시 자동으로 mTLS 사용
# ================================================================

# ── 평문 리스너 (개발 전용, 운영에선 비활성화) ───────────────────
listener 1883
protocol mqtt
allow_anonymous true

# ── TLS 리스너 (Phase 4 — 인증서 생성 후 주석 해제) ─────────────
# listener 8883
# protocol mqtt
#
# # 서버 인증서
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
#
# # 클라이언트 인증서 필수 요구 (mTLS)
# require_certificate true
# use_identity_as_username true
#
# # TLS 버전 제한 (1.2 이상만 허용)
# tls_version tlsv1.2
#
# # 익명 접속 차단
# allow_anonymous false

# ── 로그 ────────────────────────────────────────────────────────
log_dest stdout
log_type all
log_timestamp true

# ── 데이터 영속성 ────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
