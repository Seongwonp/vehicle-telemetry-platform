version: '3.8'

services:

  # ════════════════════════════════════════════════════════════
  # MQTT 브로커 — Eclipse Mosquitto
  # 차량 시뮬레이터가 센서 데이터를 publish하는 진입점
  # ════════════════════════════════════════════════════════════
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: telemetry-mosquitto
    ports:
      - "${MQTT_PORT:-1883}:1883"       # 평문 MQTT (개발용)
      - "${MQTT_TLS_PORT:-8883}:8883"   # TLS (Phase 4에서 활성화)
    volumes:
      - ./broker/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./broker/certs:/mosquitto/certs:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - telemetry-net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # Spring Boot 백엔드 — MQTT Consumer + Kafka Producer/Consumer + InfluxDB 저장
  # ════════════════════════════════════════════════════════════
  backend:
    build: ./backend
    container_name: telemetry-backend
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      # Phase 10 mTLS 활성화 시(MQTT_TLS_ENABLED=true) client.p12/truststore.p12를 읽기 위함.
      # 평문(기본값) 모드에서는 사용되지 않는다.
      - ./broker/certs:/app/certs:ro
    environment:
      MQTT_HOST: mosquitto
      # 컨테이너 간 통신은 항상 mosquitto:1883/8883 고정 포트를 쓴다 — 위 mosquitto 서비스의
      # 호스트 포트 매핑(${MQTT_PORT:-1883})과는 별개다. mTLS 테스트 시엔 이 값을 8883으로 바꾸고
      # MQTT_TLS_ENABLED도 true로 같이 바꿔야 한다(docker-compose엔 조건부 기본값 문법이 없음).
      MQTT_PORT: 1883
      MQTT_TLS_ENABLED: ${MQTT_TLS_ENABLED:-false}
      MQTT_TLS_KEYSTORE_PATH: /app/certs/client.p12
      MQTT_TLS_TRUSTSTORE_PATH: /app/certs/truststore.p12
      MQTT_TLS_STORE_PASSWORD: ${MQTT_TLS_STORE_PASSWORD:-changeit}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      # 이전까지 .env에 있어도 컨테이너에 전달되지 않던 값 — 부하 테스트로 발견해 추가.
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-60}
    networks:
      - telemetry-net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # 이상 감지 모듈 — Python Kafka Consumer (룰 기반 + IsolationForest)
  # ════════════════════════════════════════════════════════════
  anomaly-detector:
    build: ./anomaly-detector
    container_name: telemetry-anomaly-detector
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ML_ENABLED: ${ML_ENABLED:-false}
      ML_MIN_SAMPLES: ${ML_MIN_SAMPLES:-200}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
    networks:
      - telemetry-net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # 차량 시뮬레이터 — Python MQTT Publisher
  # 실행: docker-compose --profile simulator up -d
  # 로컬 실행: cd simulator && python vehicle_simulator.py
  # ════════════════════════════════════════════════════════════
  simulator:
    build: ./simulator
    container_name: telemetry-simulator
    profiles: ["simulator"]
    depends_on:
      - mosquitto
    volumes:
      # mTLS 테스트 시 TLS_CA_CERT 등 PEM 경로가 이 디렉터리를 가리키게 된다. 평문 모드에선 미사용.
      - ./broker/certs:/app/certs:ro
    environment:
      MQTT_HOST: mosquitto
      # 컨테이너 간 통신 고정 포트. mTLS 테스트 시 8883 + 아래 TLS_* 값도 함께 설정해야 한다.
      MQTT_PORT: 1883
      TLS_CA_CERT: ${SIMULATOR_TLS_CA_CERT:-}
      TLS_CLIENT_CERT: ${SIMULATOR_TLS_CLIENT_CERT:-}
      TLS_CLIENT_KEY: ${SIMULATOR_TLS_CLIENT_KEY:-}
      VEHICLE_COUNT: ${VEHICLE_COUNT:-3}
      PUBLISH_INTERVAL: ${PUBLISH_INTERVAL:-1.0}
      ANOMALY_RATE: ${ANOMALY_RATE:-0.02}
    networks:
      - telemetry-net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # Zookeeper — Kafka 클러스터 코디네이터
  # ════════════════════════════════════════════════════════════
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: telemetry-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - telemetry-net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # Kafka — 메시지 큐
  # 차량 N대의 텔레메트리 스트림을 버퍼링하고 분산 처리
  # ════════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: telemetry-kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - telemetry-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ════════════════════════════════════════════════════════════
  # Kafka 토픽 초기화 — 컨테이너 1회 실행 후 종료
  # ════════════════════════════════════════════════════════════
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: telemetry-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    networks:
      - telemetry-net

  # ════════════════════════════════════════════════════════════
  # InfluxDB — 시계열 데이터베이스
  # 차량 센서 데이터 (속도, RPM, 온도...) 저장
  # ════════════════════════════════════════════════════════════
  influxdb:
    image: influxdb:2.7
    container_name: telemetry-influxdb
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    networks:
      - telemetry-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ════════════════════════════════════════════════════════════
  # PostgreSQL — 관계형 데이터베이스
  # 차량 등록 정보, 이상 이벤트 이력 저장
  # ════════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: telemetry-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - telemetry-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════════════
  # Redis — 캐시 / Rate Limiting
  # JWT 토큰 블랙리스트, API Rate Limiting 카운터
  # ════════════════════════════════════════════════════════════
  redis:
    image: redis:7.2-alpine
    container_name: telemetry-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - telemetry-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ════════════════════════════════════════════════════════════
  # Prometheus — 메트릭 수집
  # ════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: telemetry-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - telemetry-net
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════
  # Grafana — 시각화 대시보드
  # ════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:10.4.0
    container_name: telemetry-grafana
    depends_on:
      - prometheus
      - influxdb
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUXDB_ORG: ${INFLUXDB_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - telemetry-net
    restart: unless-stopped

# ════════════════════════════════════════════════════════════════
# 네트워크
# ════════════════════════════════════════════════════════════════
networks:
  telemetry-net:
    driver: bridge

# ════════════════════════════════════════════════════════════════
# 볼륨 (데이터 영속성)
# ════════════════════════════════════════════════════════════════
volumes:
  mosquitto-data:
  mosquitto-log:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  influxdb-data:
  influxdb-config:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
